name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          git archive --prefix=qgis_openaq/ --format=zip HEAD \
            > qgis_openaq_${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: qgis_openaq_${{ github.ref_name }}.zip
          generate_release_notes: true
